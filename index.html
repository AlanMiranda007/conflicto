<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitch y su amigo en la Playa - Alan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
</head>
<body>

    <div class="escena-playa">
        <div class="sol"></div>
        <div class="nube uno"></div>
        <div class="nube dos"></div>
        <div class="pajarito uno"></div>
        <div class="pajarito dos"></div>
        <div class="mar"></div>
        <div class="arena">
            
            <div class="letrero-madera">
                <div class="poste"></div>
                <div class="tabla">
                    <span class="texto-nombre">ALAN</span>
                    <div class="clavo uno"></div>
                    <div class="clavo dos"></div>
                </div>
            </div>

            <div class="perrito">
                <div class="oreja-p izq"></div>
                <div class="oreja-p der"></div>
                <div class="cabeza-p">
                    <div class="ojo-p izq"></div>
                    <div class="ojo-p der"></div>
                    <div class="nariz-p"></div>
                </div>
                <div class="cuerpo-p"></div>
                <div class="cola-p"></div>
            </div>

        </div>
    </div>

    <div class="lienzo">
        <div class="stitch">
            <div class="oreja izquierda"></div>
            <div class="oreja derecha"></div>
            <div class="cabeza">
                <div class="parche-ojo izquierda">
                    <div class="ojo-parpadeo">
                        <div class="ojo"><div class="pupila"></div></div>
                    </div>
                </div>
                <div class="parche-ojo derecha">
                    <div class="ojo-parpadeo">
                        <div class="ojo"><div class="pupila"></div></div>
                    </div>
                </div>
                <div class="nariz"></div>
                <div class="boca"></div>
            </div>
            <div class="cuerpo">
                <div class="panza"></div>
                <div class="brazo-izquierdo">
                    <div class="antebrazo"><div class="mano"></div></div>
                </div>
                <div class="brazo-derecho">
                    <div class="antebrazo"><div class="mano"></div></div>
                </div>
                <div class="pierna-izquierda">
                    <div class="pie">
                        <div class="dedo uno"></div>
                        <div class="dedo dos"></div>
                        <div class="dedo tres"></div>
                    </div>
                </div>
                <div class="pierna-derecha">
                    <div class="pie">
                        <div class="dedo uno"></div>
                        <div class="dedo dos"></div>
                        <div class="dedo tres"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
